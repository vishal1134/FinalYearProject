# Enable this profile with:
#   --spring.profiles.active=fabric-demo
# or set:
#   SPRING_PROFILES_ACTIVE=fabric-demo

fabric.enabled=true

# Set these as environment variables before starting the backend.
# The private key path may point either to the exact PEM file or to the keystore directory.
fabric.channel-name=${FABRIC_CHANNEL_NAME:mychannel}
fabric.chaincode-name=${FABRIC_CHAINCODE_NAME:landregistry}
fabric.msp-id=${FABRIC_MSP_ID:Org1MSP}
fabric.peer-endpoint=${FABRIC_PEER_ENDPOINT:localhost:7051}
fabric.peer-host-alias=${FABRIC_PEER_HOST_ALIAS:peer0.org1.example.com}
fabric.certificate-path=${FABRIC_CERTIFICATE_PATH}
fabric.private-key-path=${FABRIC_PRIVATE_KEY_PATH}
fabric.tls-cert-path=${FABRIC_TLS_CERT_PATH}
