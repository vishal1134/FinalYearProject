spring.application.name=land-registry-backend
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=land_registry_db

server.port=${SERVER_PORT:8080}

# JWT Configuration
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000

# Fabric Gateway Configuration
fabric.enabled=${FABRIC_ENABLED:false}
fabric.channel-name=${FABRIC_CHANNEL_NAME:mychannel}
fabric.chaincode-name=${FABRIC_CHAINCODE_NAME:landregistry}
fabric.msp-id=${FABRIC_MSP_ID:Org1MSP}
fabric.peer-endpoint=${FABRIC_PEER_ENDPOINT:localhost:7051}
fabric.peer-host-alias=${FABRIC_PEER_HOST_ALIAS:peer0.org1.example.com}
fabric.certificate-path=${FABRIC_CERTIFICATE_PATH:}
fabric.private-key-path=${FABRIC_PRIVATE_KEY_PATH:}
fabric.tls-cert-path=${FABRIC_TLS_CERT_PATH:}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
